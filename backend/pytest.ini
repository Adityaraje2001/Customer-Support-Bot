[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
# Fail on unregistered marker usage
strict_markers = true
markers =
    unit: mark a test as a unit test.
    integration: mark a test as an integration test.
    workflow: mark a test as a LangGraph workflow test.
    api: mark a test as an API/HTTP-level test.

# Short traceback in CI; use --tb=long locally for deeper inspection
addopts = --tb=short
